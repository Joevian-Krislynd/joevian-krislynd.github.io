<section id="contact" class="contact-module">
  <div class="site-inner">
    <h2 class="text-heading">Get in touch</h2>
    <div class="contact-card">
      <div class="contact-header">
        <h3 class="contact-section-title">I'd love to hear from you!</h3>
        <p class="text-content">
          If you have any inquiries or just want to say hi, feel free to send a
          brief message.
        </p>
      </div>

      <form class="contact-form">
        <div class="contact-field">
          <label for="contact-name">Name</label>
          <input
            id="contact-name"
            name="name"
            type="text"
            placeholder="Your name"
            required
          />
        </div>
        <div class="contact-field">
          <label for="contact-email">Email address</label>
          <input
            id="contact-email"
            name="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="contact-field">
          <label for="contact-message">Message</label>
          <textarea
            id="contact-message"
            name="message"
            rows="6"
            placeholder="Message"
            required
          ></textarea>
        </div>
        <button type="submit" class="contact-submit">Send message</button>
      </form>
    </div>
  </div>
</section>
